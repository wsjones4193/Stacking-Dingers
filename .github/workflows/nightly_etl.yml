name: Nightly ETL

on:
  schedule:
    # 2am ET = 7am UTC (Eastern Standard Time; adjust to 6am UTC during EDT)
    - cron: "0 7 * 3-9 *"   # March–September, 7am UTC
  workflow_dispatch:
    inputs:
      full_reload:
        description: "Full reload (re-process all weeks)"
        type: boolean
        default: false

jobs:
  etl:
    name: Run Nightly ETL
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download data files from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          mkdir -p data/gamelogs data/adp_history
          aws s3 sync s3://$S3_BUCKET/data/ data/ --exclude "*.gitkeep"

      - name: Run ETL
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.full_reload }}" = "true" ]; then
            ARGS="--full-reload"
          fi
          python scripts/nightly_etl.py --season 2026 $ARGS

      - name: Upload updated data files to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 sync data/ s3://$S3_BUCKET/data/ \
            --exclude "*.gitkeep" \
            --exclude ".gitkeep"

      - name: Upload ETL log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-log-${{ github.run_id }}
          path: data/etl.log
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ETL failed on ${new Date().toISOString().split('T')[0]}`,
              body: `Nightly ETL workflow failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['etl-failure']
            })
